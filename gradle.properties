# =====================================================
# Gradle 配置
# =====================================================
# JDK 路径由 gradle-detect-platform.gradle.kts 自动检测
# =====================================================

# JVM 参数
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# 强制使用系统 JDK（解决 Cursor IDE JDK 不完整问题）
# macOS 上使用 Homebrew 安装的 Temurin JDK
org.gradle.java.home=/Library/Java/JavaVirtualMachines/jdk-23.jdk/Contents/Home

# Kotlin 代码风格
kotlin.code.style=official

# AndroidX
android.useAndroidX=true

# 并行构建
org.gradle.parallel=true

# 非传递性 R class
android.nonTransitiveRClass=true

# KSP 增量编译禁用（解决跨平台缓存问题）
ksp.incremental=false

# 禁用 Gradle 自动检测 JDK
org.gradle.java.installations.auto-detect=false
